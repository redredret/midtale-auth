<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>MidTale — Returning to game…</title>
<style>
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #0b0d14; color: #ccccdd; font-family: system-ui, sans-serif; text-align: center;
  }
  .card { padding: 2.5rem 2rem; max-width: 22rem; }
  h1 { color: #f2d97a; font-size: 1.6rem; margin: 0 0 0.75rem; }
  p { font-size: 0.95rem; line-height: 1.5; margin: 0.5rem 0 1.5rem; opacity: 0.85; }
  a.btn {
    display: inline-block; padding: 0.9rem 2rem; border-radius: 10px; text-decoration: none;
    background: #4fa8e3; color: #06111c; font-weight: 600; font-size: 1.05rem;
  }
  .hint { font-size: 0.8rem; opacity: 0.55; margin-top: 1.5rem; }
</style>
</head>
<body>
<div class="card">
  <h1>MidTale</h1>
  <p id="msg">Finishing sign-in…</p>
  <a id="open" class="btn" href="#" style="display:none">Return to MidTale</a>
  <p class="hint">You can close this tab once the game reopens.</p>
</div>
<script>
  // Login relay: SpacetimeAuth can only redirect to https:// URLs, so this
  // page hands the OAuth result to the game two ways at once:
  //  1. CLIPBOARD (primary): the button copies "midtale-login:<code>:<state>"
  //     and the game reads it when the player returns.
  //  2. Custom scheme midtale:// (bonus): reopens the game where the OS
  //     supports it. Harmless where it doesn't.
  // No secrets live here — the code is single-use and useless without the
  // PKCE verifier that never leaves the game.
  (function () {
    var target = "midtale://callback" + window.location.search;
    var qs = new URLSearchParams(window.location.search);
    var code = qs.get("code");
    var state = qs.get("state");
    var msg = document.getElementById("msg");
    var btn = document.getElementById("open");

    if (!code || !state) {
      msg.textContent = "Nothing to forward — open this page from the sign-in flow.";
      return;
    }

    var payload = "midtale-login:" + code + ":" + state;
    var copyCode = function () {
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(payload);
        } else {
          var ta = document.createElement("textarea");
          ta.value = payload;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand("copy");
          document.body.removeChild(ta);
        }
        return true;
      } catch (e) { return false; }
    };

    msg.textContent = "Sign-in approved! Tap the button, then return to the game.";
    btn.style.display = "inline-block";
    btn.href = "#";
    btn.addEventListener("click", function (ev) {
      ev.preventDefault();
      copyCode();                      // needs this user gesture
      msg.textContent = "Code copied — now switch back to MidTale.";
      window.location.href = target;   // bonus: reopen directly where schemes work
    });

    // Opportunistic scheme hop for platforms where it works; the clipboard
    // path still needs the tap, so the button stays front and center.
    document.addEventListener("visibilitychange", function () {
      if (!document.hidden) { window.location.href = target; }
    });
  })();
</script>
</body>
</html>
